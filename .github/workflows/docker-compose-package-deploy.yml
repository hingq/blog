name: Package and Deploy Docker Compose

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: blog
  IMAGE_TAG: latest
  IMAGE_TAR: blog-linux-amd64.tar
  REMOTE_DIR: /blog

jobs:
  package-and-deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with docker compose
        run: docker compose build --no-cache nextjs

      - name: Save image as tar package
        run: docker save -o "${IMAGE_TAR}" "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Prepare env file (optional)
        if: ${{ env.DEPLOY_ENV_FILE != '' }}
        run: |
          printf '%s' "$DEPLOY_ENV_FILE" > .deploy.env

      - name: Validate deploy secrets
        run: |
          set -e
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "DEPLOY_HOST and DEPLOY_USER are required."
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && [ -z "${{ secrets.DEPLOY_PASSWORD }}" ]; then
            echo "Either DEPLOY_SSH_KEY or DEPLOY_PASSWORD is required for SCP/SSH deployment."
            exit 1
          fi

      - name: Upload tar and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "${{ env.IMAGE_TAR }},docker-compose.yml"
          target: ${{ env.REMOTE_DIR }}

      - name: Upload env file to server (optional)
        if: ${{ env.DEPLOY_ENV_FILE != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: ".deploy.env"
          target: ${{ env.REMOTE_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd "${{ env.REMOTE_DIR }}"
            if [ -f .deploy.env ]; then
              mv -f .deploy.env .env
            fi
            docker load -i "${{ env.IMAGE_TAR }}"
            docker compose down
            docker compose up -d --force-recreate nextjs
            docker compose ps
            rm -f "${{ env.IMAGE_TAR }}"
