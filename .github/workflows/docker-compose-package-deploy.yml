name: Package and Deploy Docker Compose

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-and-deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: blog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with docker compose
        run: docker compose build --no-cache nextjs

      - name: Save image as tar package
        run: docker save -o "blog-linux-amd64.tar" "blog:latest"

      - name: Validate deploy secrets
        run: |
          set -e
          if [ -z "${{ secrets.DEPLOY_HOST }}" ] || [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "DEPLOY_HOST and DEPLOY_USER are required. Please add them to repository secrets or Environment secrets for environment: blog."
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && [ -z "${{ secrets.DEPLOY_PASSWORD }}" ]; then
            echo "Either DEPLOY_SSH_KEY or DEPLOY_PASSWORD is required for SCP/SSH deployment."
            exit 1
          fi

      - name: Prepare env file for upload
        run: |
          if [ -n "${{ secrets.DEPLOY_ENV_FILE }}" ]; then
            printf '%s' "${{ secrets.DEPLOY_ENV_FILE }}" > .env
          fi
          if [ ! -f .env ]; then
            echo "No .env found. Add repository .env file or set DEPLOY_ENV_FILE secret in Environment: blog."
            exit 1
          fi

      - name: Normalize artifact permissions
        run: |
          sudo chown "$USER:$USER" blog-linux-amd64.tar docker-compose.yml .env || true
          chmod 644 blog-linux-amd64.tar docker-compose.yml .env

      - name: Upload tar and compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "blog-linux-amd64.tar,docker-compose.yml,.env"
          target: /blog

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd "/blog"
            docker load -i "blog-linux-amd64.tar"
            docker compose down
            docker compose up -d --force-recreate nextjs
            docker compose ps
            rm -f "blog-linux-amd64.tar"
