name: Build and Deploy via ACR

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: blog

    env:
      REGISTRY: crpi-gkcfsuhf4ajbzvh0.cn-beijing.personal.cr.aliyuncs.com
      IMAGE_REPO: ather/next_blog
      REGION_ID: cn-chengdu
      INSTANCE_ID: ${{ secrets.ALIYUN_INSTANCE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package_version
        run: node .github/scripts/read-package-version.mjs package.json

      - name: Validate required secrets
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
          ALIYUN_INSTANCE_ID: ${{ secrets.ALIYUN_INSTANCE_ID }}
        run: bash .github/scripts/docker-compose-package-deploy/validate-required-secrets.sh

      - name: Log in to ACR
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: bash .github/scripts/docker-compose-package-deploy/login-acr.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:${{ steps.package_version.outputs.package_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}:latest
          target: runner
          no-cache: true

      - name: Install Aliyun CLI
        run: bash .github/scripts/docker-compose-package-deploy/install-aliyun-cli.sh

      - name: Configure Aliyun CLI
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: bash .github/scripts/docker-compose-package-deploy/configure-aliyun-cli.sh

      - name: Trigger deploy on ECS
        env:
          DEPLOY_CMD: cd /blog && bash /blog/install.sh latest
        run: bash .github/scripts/docker-compose-package-deploy/trigger-ecs-deploy.sh

      - name: Wait for deploy result
        run: bash .github/scripts/docker-compose-package-deploy/wait-for-ecs-deploy.sh
